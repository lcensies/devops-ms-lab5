name: DevSecOps Pipeline with LLM

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest test_app.py -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/
          retention-days: 30

  llm-review:
    name: LLM Code Review
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Send code to OpenAI for review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p llm-artifacts
          CODE=$(python3 -c "import json; print(json.dumps(open('app.py').read()))")
          PIPELINE=$(python3 -c "import json; print(json.dumps(open('.github/workflows/pipeline.yml').read()))")
          curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [
                {
                  \"role\": \"system\",
                  \"content\": \"You are a senior software engineer reviewing application source code and CI/CD pipeline configuration. Provide a concise technical review covering: 1) what the application does, 2) code quality observations, 3) notable design decisions in the pipeline, 4) potential improvement areas.\"
                },
                {
                  \"role\": \"user\",
                  \"content\": \"Review this application source code and CI/CD pipeline:\\n\\n### app.py\\n\" $CODE \"\\n\\n### pipeline.yml\\n\" $PIPELINE
                }
              ],
              \"max_tokens\": 800
            }" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if 'choices' in d:
              print(d['choices'][0]['message']['content'])
          else:
              print('API error:', json.dumps(d, indent=2))
          " > llm-artifacts/llm-review.md
          echo "LLM review output:"
          cat llm-artifacts/llm-review.md

      - name: Upload LLM review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-review
          path: llm-artifacts/llm-review.md
          retention-days: 30

  sast-scan:
    name: SAST - Bandit
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Bandit SAST scan
        continue-on-error: true
        run: |
          pip install bandit
          bandit -r app.py -f json -o bandit-report.json || true
          bandit -r app.py

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-report
          path: bandit-report.json
          retention-days: 30

  container-build:
    name: Container Image Build
    runs-on: ubuntu-latest
    needs: sast-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: calc-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: calc-app:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Run Trivy for JSON report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: calc-app:${{ github.sha }}
          format: 'json'
          output: 'trivy-results.json'

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-container-scan
          path: trivy-results.json
          retention-days: 30

  k8s-deploy:
    name: Kubernetes Deployment
    runs-on: ubuntu-latest
    needs: container-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: calc-cluster

      - name: Build Docker image for kind
        run: docker build -t calc-app:local .

      - name: Load image into kind cluster
        run: kind load docker-image calc-app:local --name calc-cluster

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/calc-app -n calc-app --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n calc-app
          kubectl get svc -n calc-app
          kubectl describe deployment calc-app -n calc-app

      - name: Save deployment report
        if: always()
        run: |
          mkdir -p k8s-report
          kubectl get all -n calc-app -o wide > k8s-report/resources.txt
          kubectl get events -n calc-app --sort-by='.lastTimestamp' > k8s-report/events.txt

      - name: Upload K8s deployment report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k8s-deployment-report
          path: k8s-report/
          retention-days: 30

  llm-security-review:
    name: LLM Security Analysis
    runs-on: ubuntu-latest
    needs: k8s-deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security-focused LLM analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p llm-artifacts
          PIPELINE=$(python3 -c "import json; print(json.dumps(open('.github/workflows/pipeline.yml').read()))")
          curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [
                {
                  \"role\": \"system\",
                  \"content\": \"You are a DevSecOps security engineer. Analyze the provided CI/CD pipeline configuration from a security, reliability, and trust perspective. Identify potential security risks, vulnerabilities, and failure points. For each finding, rate its severity (HIGH/MEDIUM/LOW) and justify your observation. Be specific and critical.\"
                },
                {
                  \"role\": \"user\",
                  \"content\": \"Analyze this CI/CD pipeline for security risks, supply-chain vulnerabilities, and reliability failure points:\\n\\n\" $PIPELINE
                }
              ],
              \"max_tokens\": 1000
            }" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if 'choices' in d:
              print(d['choices'][0]['message']['content'])
          else:
              print('API error:', json.dumps(d, indent=2))
          " > llm-artifacts/llm-security-analysis.md
          echo "LLM security analysis output:"
          cat llm-artifacts/llm-security-analysis.md

      - name: Upload LLM security analysis artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-security-analysis
          path: llm-artifacts/llm-security-analysis.md
          retention-days: 30

  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [build-and-test, llm-review, sast-scan, container-build, k8s-deploy, llm-security-review]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# DevSecOps Pipeline with LLM - Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Actor: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build and Test | ${{ needs.build-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| LLM Code Review | ${{ needs.llm-review.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST (Bandit) | ${{ needs.sast-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Build + Trivy | ${{ needs.container-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Kubernetes Deployment | ${{ needs.k8s-deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| LLM Security Analysis | ${{ needs.llm-security-review.result }} |" >> $GITHUB_STEP_SUMMARY
